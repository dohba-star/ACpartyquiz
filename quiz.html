<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クイズイベント</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            padding-bottom: 90px;
        }

        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }

        /* 問題番号入力 */
        .question-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .question-nav label {
            font-size: 18px;
            font-weight: bold;
            color: #444;
            white-space: nowrap;
        }

        .question-nav-input {
            width: 72px;
            padding: 10px 8px;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            border: 2px solid #dde3ea;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        .question-nav-input:focus { border-color: #4a90e2; }

        .question-nav-btn {
            padding: 10px 20px;
            font-size: 15px;
            font-weight: bold;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .question-nav-btn:hover { background: #3a7bd5; }

        .nav-error {
            text-align: center;
            color: #e53935;
            font-size: 13px;
            margin-bottom: 16px;
            min-height: 18px;
        }

        .question-number {
            font-size: 13px;
            color: #4a90e2;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .question-text { display: none; }

        .answer-input {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 2px solid #dde3ea;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        .answer-input:focus { border-color: #4a90e2; }
        .answer-input:disabled { background: #f8f9fa; }

        .submit-btn {
            width: 100%;
            margin-top: 16px;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .submit-btn:hover:not(:disabled) { background: #3a7bd5; }
        .submit-btn:disabled { background: #b0c4de; cursor: not-allowed; }

        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            display: none;
            text-align: center;
        }

        .result.correct { background: #e8f5e9; }
        .result.incorrect { background: #fdecea; }

        .result-label { font-size: 28px; font-weight: bold; margin-bottom: 10px; }
        .result.correct .result-label { color: #2e7d32; }
        .result.incorrect .result-label { color: #c62828; }

        .result-hint {
            font-size: 15px;
            color: #2e7d32;
            line-height: 1.6;
        }

        .next-btn {
            width: 100%;
            margin-top: 16px;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            background: #34a853;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
            display: none;
        }

        .next-btn:hover { background: #2d9147; }

        /* 秘密の問題画面 */
        .secret-screen {
            display: none;
            text-align: center;
        }

        .secret-title {
            font-size: 22px;
            font-weight: bold;
            color: #7b2ff7;
            line-height: 1.6;
        }

        /* 最終結果画面 */
        .final-screen { text-align: center; display: none; }

        .final-title {
            font-size: 28px;
            font-weight: bold;
            color: #222;
            margin-bottom: 16px;
        }

        .final-score {
            font-size: 64px;
            font-weight: bold;
            color: #4a90e2;
            margin-bottom: 4px;
        }

        .final-score-label {
            font-size: 15px;
            color: #888;
            margin-bottom: 32px;
        }

        .final-summary {
            text-align: left;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .summary-item {
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .summary-q { font-size: 13px; color: #888; margin-bottom: 4px; }

        .summary-result {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .badge {
            font-size: 11px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 20px;
            white-space: nowrap;
        }

        .badge-correct { background: #e8f5e9; color: #2e7d32; }
        .badge-incorrect { background: #fdecea; color: #c62828; }
        .summary-answer { font-size: 14px; color: #333; }

        /* トップ画面 */
        .top-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 200px;
        }

        .top-label {
            font-size: 18px;
            font-weight: bold;
            color: #444;
            margin-bottom: 20px;
        }

        /* 最終問題回答画面 */
        .final-question-screen { display: none; }

        .final-field {
            margin-bottom: 20px;
        }

        .final-label {
            display: block;
            font-size: 15px;
            font-weight: bold;
            color: #444;
            margin-bottom: 8px;
        }

        .back-btn {
            width: 100%;
            margin-top: 12px;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            background: white;
            color: #888;
            border: 2px solid #dde3ea;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .back-btn:hover { background: #f0f4f8; }

        .send-done {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #e8f5e9;
            border-radius: 10px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #2e7d32;
        }

        /* 固定フッターボタン */
        .footer-btn-wrap {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(240,244,248,0.95);
            padding: 16px 20px;
            display: flex;
            justify-content: center;
        }

        .footer-btn {
            max-width: 600px;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            background: #e65c00;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .footer-btn:hover { background: #cf5200; }

        /* タイマー */
        .timer-container {
            display: none;
            margin-bottom: 16px;
        }

        .timer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .timer-label { font-size: 12px; color: #888; }

        .timer-text {
            font-size: 18px;
            font-weight: bold;
            color: #4a90e2;
        }

        .timer-bar-bg {
            background: #e8edf2;
            border-radius: 4px;
            height: 8px;
            overflow: hidden;
        }

        .timer-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 1s linear, background 1s;
        }

        /* 3択選択肢 */
        .options-container {
            display: none;
            flex-direction: column;
            gap: 10px;
            margin-top: 4px;
        }

        .option-btn {
            width: 100%;
            padding: 14px 18px;
            font-size: 16px;
            font-weight: bold;
            text-align: left;
            background: white;
            color: #333;
            border: 2px solid #dde3ea;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-btn:hover:not(:disabled) {
            border-color: #4a90e2;
            background: #f0f6ff;
        }

        .option-btn.selected-correct {
            background: #e8f5e9;
            border-color: #4caf50;
            color: #2e7d32;
        }

        .option-btn.selected-incorrect {
            background: #fdecea;
            border-color: #e53935;
            color: #c62828;
        }

        .option-btn:disabled { cursor: not-allowed; }

        .option-btn.selected {
            border-color: #4a90e2;
            background: #e8f0fe;
            color: #1a5cad;
        }

        /* 確認モーダル */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active { display: flex; }

        .modal-box {
            background: white;
            border-radius: 16px;
            padding: 30px;
            max-width: 360px;
            width: 90%;
            text-align: center;
        }

        .modal-message {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 24px;
            color: #333;
            white-space: pre-line;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
        }

        .modal-btn-no {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            background: white;
            color: #888;
            border: 2px solid #dde3ea;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
        }

        .modal-btn-no:hover { background: #f0f4f8; }

        .modal-btn-yes {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            background: #e65c00;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
        }

        .modal-btn-yes:hover { background: #cf5200; }
    </style>
</head>
<body>
<div class="container">

    <!-- 氏名入力画面 -->
    <div id="name-screen" class="top-screen">
        <div class="final-field" style="width:100%">
            <label class="final-label">氏名</label>
            <input type="text" class="answer-input" id="name-input" placeholder="氏名を入力してください" />
        </div>
        <button class="submit-btn" id="name-submit-btn" style="margin-top:16px">次へ</button>
        <div class="nav-error" id="name-error"></div>
    </div>

    <!-- メニュー画面 -->
    <div id="menu-screen" class="top-screen" style="display:none">
        <div class="top-label">問題番号を入力してください</div>
        <div class="question-nav">
            <label for="top-nav-input">第</label>
            <input type="number" class="question-nav-input" id="top-nav-input" min="1" placeholder="?" />
            <label for="top-nav-input">問</label>
            <button class="question-nav-btn" id="top-nav-btn">移動</button>
        </div>
        <div class="nav-error" id="top-nav-error"></div>
    </div>

    <!-- クイズ画面 -->
    <div id="quiz-screen" style="display:none">
        <div class="question-nav">
            <label for="nav-input">第</label>
            <input type="number" class="question-nav-input" id="nav-input" min="1" placeholder="?" />
            <label for="nav-input">問</label>
            <button class="question-nav-btn" id="nav-btn">移動</button>
        </div>
        <div class="nav-error" id="nav-error"></div>
        <div class="timer-container" id="timer-container">
            <div class="timer-header">
                <span class="timer-label">残り時間</span>
                <span class="timer-text" id="timer-text">0</span>
            </div>
            <div class="timer-bar-bg">
                <div class="timer-bar-fill" id="timer-bar-fill"></div>
            </div>
        </div>
        <div class="question-number" id="question-number"></div>
        <div class="question-text" id="question-text"></div>
        <div class="options-container" id="options-container"></div>
        <input type="text" class="answer-input" id="answer-input" placeholder="解答を入力してください" />
        <button class="submit-btn" id="submit-btn">解答する</button>
        <div class="result" id="result">
            <div class="result-label" id="result-label"></div>
            <div class="result-hint" id="result-hint"></div>
        </div>
        <button class="next-btn" id="next-btn">結果を見る</button>
    </div>

    <!-- 秘密の問題画面 -->
    <div id="secret-screen" class="secret-screen">
        <div class="secret-title">すべての答えから導き出される最後の問題の答えは？</div>
    </div>

    <!-- 最終結果画面 -->
    <div id="final-screen" class="final-screen">
        <div class="final-title">クイズ終了！</div>
        <div class="final-score" id="final-score"></div>
        <div class="final-score-label">正解数 / 全問数</div>
        <div class="final-summary" id="final-summary"></div>
    </div>

    <!-- 最終問題回答画面 -->
    <div id="final-question-screen" class="final-question-screen">
        <div class="final-field">
            <label class="final-label">最後の答え</label>
            <input type="text" class="answer-input" id="final-q-input" placeholder="解答を入力してください" />
        </div>
        <div class="final-field">
            <label class="final-label">氏名</label>
            <input type="text" class="answer-input" id="final-name-input" placeholder="氏名を入力してください" />
        </div>
        <button class="submit-btn" id="final-q-submit">送付</button>
        <div class="send-done" id="send-done">送信しました</div>
        <button class="back-btn" id="final-back-btn">戻る</button>
    </div>

</div>

<!-- 確認モーダル -->
<div id="confirm-modal" class="modal-overlay">
    <div class="modal-box">
        <p class="modal-message" id="confirm-message"></p>
        <div class="modal-buttons">
            <button class="modal-btn-no" id="confirm-no">いいえ</button>
            <button class="modal-btn-yes" id="confirm-yes">はい</button>
        </div>
    </div>
</div>

<!-- 固定フッターボタン -->
<div class="footer-btn-wrap">
    <button class="footer-btn" id="goto-final-btn">最後の答えの送信</button>
</div>

<script>
    const questions = [
        { number: '第1問',  text: '', answers: ['黒柳徹子', 'くろやなぎてつこ'], timeLimit: 20, hint: '最終問題の答えのヒント：答えは1つの単語' },
        { number: '第2問',  text: '', answers: ['蠍', 'さそり'],                timeLimit: 20, hint: '最後の答えのヒント：答えは日本語' },
        { number: '第3問',  text: '', answers: ['うお', '魚'],                  timeLimit: 20, hint: '最終問題の答えのヒント：答えは「かくもの」' },
        { number: '第4問',  text: '', answers: ['ほ'],                          timeLimit: 40, hint: '最後の答えのヒント：アグリコネクトに関係がある言葉' },
        { number: '第5問',  text: '', answers: ['寄席', 'よせ'],                timeLimit: 40, hint: '最終問題の答えのヒント：答えは「みるもの」' },
        { number: '第6問',  text: '', answers: ['的', 'まと'],                  timeLimit: 40, hint: '最後の答えのヒント：このパーティーに関係がある言葉' },
        { number: '第7問',  text: '', answers: ['日にち', 'ひにち'],             timeLimit: 40, hint: '最終問題の答えのヒント：答えは2文字' },
        { number: '第8問',  text: '', answers: ['船', 'ふね'],                  timeLimit: 40, hint: '最後の答えのヒント：あなたが知っている言葉' },
        { number: '第9問',  text: '', answers: ['ケール'],         options: ['リーフレタス', 'ケール', 'チンゲン菜'], timeLimit: 15, hint: '最終問題の答えのヒント：QRコードの裏面のメモに注目しよう' },
        { number: '第10問', text: '', answers: ['ハワイ'],         options: ['佐渡', '奄美', 'ハワイ'],              timeLimit: 15, hint: '最後の答えのヒント：手元にあるものに使おう' },
        { number: '第11問', text: '', answers: ['鮎', 'あゆ'],     options: ['イワナ', 'ヤマメ', 'アユ'],            timeLimit: 15, hint: '最終問題の答えのヒント：イラストに注目しよう' },
        { number: '第12問', text: '', answers: ['ラミレス'],       options: ['ラミレス', 'ペタジーニ', 'ブランコ'],  timeLimit: 15, hint: '最後の答えのヒント：すべての問題の答えが必要' },
        { number: '第13問', text: '', answers: ['鵺', 'ぬえ'],     options: ['鵠', '鴇', '鵺'],                    timeLimit: 15, hint: '最終問題の答えのヒント：すべての答えを消してみよう' },
        { number: '最終問題', text: '', answers: ['メモ'],          timeLimit: null, hint: 'すべての問題の答えを消した時にあなたの手元に残っている言葉が最後の答え' },
    ];

    function normalize(str) {
        return str
            .trim()
            .replace(/\s/g, '')
            .replace(/[ァ-ヶ]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0x60));
    }

    function isCorrectAnswer(userAnswer, answers) {
        return answers.some(a => normalize(a) === normalize(userAnswer));
    }

    let currentIndex = 0;
    let userName = '';
    const states = Array(questions.length).fill(null);
    let timerInterval = null;
    let timerRemaining = 0;
    let selectedOption = null;

    const timerContainer = document.getElementById('timer-container');
    const timerText      = document.getElementById('timer-text');
    const timerBarFill   = document.getElementById('timer-bar-fill');

    function stopTimer() {
        if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    }

    function startTimer(seconds) {
        stopTimer();
        timerRemaining = seconds;
        timerContainer.style.display = 'block';
        updateTimerDisplay(seconds, seconds);

        timerInterval = setInterval(() => {
            timerRemaining--;
            updateTimerDisplay(timerRemaining, seconds);
            if (timerRemaining <= 0) {
                stopTimer();
                onTimeout();
            }
        }, 1000);
    }

    function updateTimerDisplay(remaining, total) {
        timerText.textContent = remaining + '秒';
        const pct = total > 0 ? (remaining / total) * 100 : 0;
        timerBarFill.style.width = pct + '%';
        timerBarFill.style.background = pct > 50 ? '#4caf50' : pct > 25 ? '#ff9800' : '#e53935';
        timerText.style.color         = pct > 50 ? '#4caf50' : pct > 25 ? '#ff9800' : '#e53935';
    }

    function onTimeout() {
        const q = questions[currentIndex];
        if (states[currentIndex]) return;
        states[currentIndex] = { userAnswer: '（時間切れ）', isCorrect: false };

        if (q.options) {
            renderOptions(q, '（時間切れ）');
        } else {
            answerInput.disabled = true;
            submitBtn.disabled = true;
        }

        resultDiv.style.display = 'block';
        resultDiv.className = 'result incorrect';
        resultLabel.textContent = '⏰ 時間切れ';
        resultHint.innerHTML = '';

        const allAnswered = states.every(s => s !== null);
        const allCorrect  = states.every(s => s && s.isCorrect);
        if (allAnswered && allCorrect) {
            setTimeout(() => showOnly('secret'), 1000);
        } else if (allAnswered && !allCorrect) {
            nextBtn.style.display = 'block';
        }
    }

    const screens = {
        name:          document.getElementById('name-screen'),
        menu:          document.getElementById('menu-screen'),
        quiz:          document.getElementById('quiz-screen'),
        secret:        document.getElementById('secret-screen'),
        final:         document.getElementById('final-screen'),
        finalQuestion: document.getElementById('final-question-screen'),
    };

    const footerBtnWrap = document.querySelector('.footer-btn-wrap');
    let finalSubmitted = false;

    function updateFooterBtn() {
        gotoFinalBtn.textContent = finalSubmitted ? '送信済み' : '最後の答えの送信';
        gotoFinalBtn.disabled = finalSubmitted;
        gotoFinalBtn.style.background = finalSubmitted ? '#aaa' : '';
        gotoFinalBtn.style.cursor = finalSubmitted ? 'not-allowed' : '';
    }

    function showOnly(screenKey) {
        if (screenKey !== 'quiz') stopTimer();
        Object.values(screens).forEach(s => s.style.display = 'none');
        screens[screenKey].style.display = 'block';
        footerBtnWrap.style.display = (screenKey === 'name' || screenKey === 'finalQuestion') ? 'none' : 'flex';
    }

    const navInput         = document.getElementById('nav-input');
    const navBtn           = document.getElementById('nav-btn');
    const navError         = document.getElementById('nav-error');
    const questionNumber   = document.getElementById('question-number');
    const questionText     = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const answerInput      = document.getElementById('answer-input');
    const submitBtn        = document.getElementById('submit-btn');
    const resultDiv      = document.getElementById('result');
    const resultLabel    = document.getElementById('result-label');
    const resultHint     = document.getElementById('result-hint');
    const nextBtn        = document.getElementById('next-btn');
    const finalQInput    = document.getElementById('final-q-input');
    const finalNameInput = document.getElementById('final-name-input');
    const finalQSubmit   = document.getElementById('final-q-submit');
    const sendDone       = document.getElementById('send-done');
    const gotoFinalBtn   = document.getElementById('goto-final-btn');

    function navigateByInput() {
        const num = parseInt(navInput.value);
        if (isNaN(num) || num < 1 || num > questions.length) {
            navError.textContent = 'その問題は存在しません';
            return;
        }
        navError.textContent = '';
        goToQuestion(num - 1);
    }

    function goToQuestion(index) {
        currentIndex = index;
        navInput.value = index + 1;
        showOnly('quiz');
        loadQuestion(index);
    }

    function renderOptions(q, answeredValue) {
        optionsContainer.innerHTML = '';
        optionsContainer.style.display = 'flex';
        answerInput.style.display = 'none';

        if (answeredValue !== null) {
            submitBtn.style.display = 'none';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = `${'①②③'[i]} ${opt}`;
                btn.disabled = true;
                if (opt === answeredValue) {
                    const correct = isCorrectAnswer(opt, q.answers);
                    btn.classList.add(correct ? 'selected-correct' : 'selected-incorrect');
                }
                optionsContainer.appendChild(btn);
            });
        } else {
            selectedOption = null;
            submitBtn.style.display = 'block';
            submitBtn.disabled = true;
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = `${'①②③'[i]} ${opt}`;
                btn.addEventListener('click', () => {
                    optionsContainer.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedOption = opt;
                    submitBtn.disabled = false;
                });
                optionsContainer.appendChild(btn);
            });
        }
    }

    function loadQuestion(index) {
        const q = questions[index];
        const s = states[index];

        questionNumber.textContent = q.number;
        questionText.textContent = q.text;

        if (q.options) {
            renderOptions(q, s ? s.userAnswer : null);
        } else {
            optionsContainer.style.display = 'none';
            answerInput.style.display = 'block';
            submitBtn.style.display = 'block';
        }

        if (s) {
            stopTimer();
            timerContainer.style.display = 'none';
            if (!q.options) {
                answerInput.value = s.userAnswer;
                answerInput.disabled = true;
                submitBtn.disabled = true;
            }
            resultDiv.style.display = 'block';
            resultDiv.className = `result ${s.isCorrect ? 'correct' : 'incorrect'}`;
            resultLabel.textContent = s.isCorrect ? '⭕ 正解！' : (s.userAnswer === '（時間切れ）' ? '⏰ 時間切れ' : '❌ 不正解');
            resultHint.innerHTML = s.isCorrect ? q.hint.replace('：', '：<br>') : '';

            const allAnswered = states.every(st => st !== null);
            const allCorrect  = states.every(st => st && st.isCorrect);
            nextBtn.style.display = (allAnswered && !allCorrect) ? 'block' : 'none';
        } else {
            if (!q.options) {
                answerInput.value = '';
                answerInput.disabled = false;
                answerInput.focus();
                submitBtn.disabled = false;
            }
            resultDiv.style.display = 'none';
            resultDiv.className = 'result';
            nextBtn.style.display = 'none';
            if (q.timeLimit) startTimer(q.timeLimit);
            else timerContainer.style.display = 'none';
        }
    }

    function checkAnswerWithValue(userAnswer) {
        const q = questions[currentIndex];
        const isCorrect = isCorrectAnswer(userAnswer, q.answers);

        states[currentIndex] = { userAnswer, isCorrect };
        stopTimer();
        timerContainer.style.display = 'none';

        renderOptions(q, userAnswer);

        resultDiv.style.display = 'block';
        resultDiv.className = `result ${isCorrect ? 'correct' : 'incorrect'}`;
        resultLabel.textContent = isCorrect ? '⭕ 正解！' : '❌ 不正解';
        resultHint.innerHTML = isCorrect ? q.hint.replace('：', '：<br>') : '';

        const allAnswered = states.every(s => s !== null);
        const allCorrect  = states.every(s => s && s.isCorrect);

        if (allAnswered && allCorrect) {
            setTimeout(() => showOnly('secret'), 1000);
        } else if (allAnswered && !allCorrect) {
            nextBtn.style.display = 'block';
        }
    }

    function checkAnswer() {
        const q = questions[currentIndex];
        if (q.options) {
            if (!selectedOption) return;
            checkAnswerWithValue(selectedOption);
            return;
        }
        const userAnswer = answerInput.value.trim();
        if (!userAnswer) return;

        const isCorrect = isCorrectAnswer(userAnswer, q.answers);

        states[currentIndex] = { userAnswer, isCorrect };
        stopTimer();
        timerContainer.style.display = 'none';
        answerInput.disabled = true;
        submitBtn.disabled = true;

        resultDiv.style.display = 'block';
        resultDiv.className = `result ${isCorrect ? 'correct' : 'incorrect'}`;
        resultLabel.textContent = isCorrect ? '⭕ 正解！' : '❌ 不正解';
        resultHint.innerHTML = isCorrect ? q.hint.replace('：', '：<br>') : '';

        const allAnswered = states.every(s => s !== null);
        const allCorrect  = states.every(s => s && s.isCorrect);

        if (allAnswered && allCorrect) {
            setTimeout(() => showOnly('secret'), 1000);
        } else if (allAnswered && !allCorrect) {
            nextBtn.style.display = 'block';
        }
    }

    function showFinalQuestion() {
        if (finalSubmitted) return;
        showOnly('finalQuestion');
        finalQInput.value = '';
        finalNameInput.value = userName;
        finalQInput.disabled = false;
        finalNameInput.disabled = false;
        finalQSubmit.disabled = false;
        sendDone.style.display = 'none';
        finalQInput.focus();
    }

    const confirmModal   = document.getElementById('confirm-modal');
    const confirmMessage = document.getElementById('confirm-message');
    const confirmYes     = document.getElementById('confirm-yes');
    const confirmNo      = document.getElementById('confirm-no');
    let confirmCallback  = null;

    function showConfirmModal(message, onYes) {
        confirmMessage.textContent = message;
        confirmCallback = onYes;
        confirmModal.classList.add('active');
    }

    function closeConfirmModal() {
        confirmModal.classList.remove('active');
        confirmCallback = null;
    }

    confirmYes.addEventListener('click', () => {
        const cb = confirmCallback;
        closeConfirmModal();
        if (cb) cb();
    });

    confirmNo.addEventListener('click', closeConfirmModal);

    function doSubmitFinalAnswer() {
        const answer = finalQInput.value.trim();
        const name   = finalNameInput.value.trim();
        if (!answer || !name) return;

        finalSubmitted = true;
        finalQInput.disabled = true;
        finalNameInput.disabled = true;
        finalQSubmit.disabled = true;
        sendDone.style.display = 'block';
        updateFooterBtn();

        const formUrl = 'https://docs.google.com/forms/d/e/1FAIpQLSfyNGH222hnSBl6Lfj77Dx_o7vRzhgjdivnzSpO4W8N7BLdqg/formResponse';
        const body = new FormData();
        body.append('entry.798180189', answer);
        body.append('entry.1420705625', name);
        fetch(formUrl, { method: 'POST', mode: 'no-cors', body });
    }

    function submitFinalAnswer() {
        const answer = finalQInput.value.trim();
        const name   = finalNameInput.value.trim();
        if (!answer || !name) return;
        showConfirmModal(`一人一度しか送信できません。\n最後の答えは「${answer}」でいいですか？`, doSubmitFinalAnswer);
    }

    function submitName() {
        const name = document.getElementById('name-input').value.trim();
        const errorEl = document.getElementById('name-error');
        if (!name) {
            errorEl.textContent = '氏名を入力してください';
            return;
        }
        errorEl.textContent = '';
        userName = name;
        showOnly('menu');
        document.getElementById('top-nav-input').focus();
    }

    function topNavigate() {
        const num = parseInt(document.getElementById('top-nav-input').value);
        const errorEl = document.getElementById('top-nav-error');
        if (isNaN(num) || num < 1 || num > questions.length) {
            errorEl.textContent = 'その問題は存在しません';
            return;
        }
        errorEl.textContent = '';
        currentIndex = num - 1;
        navInput.value = num;
        showOnly('quiz');
        loadQuestion(currentIndex);
    }

    document.getElementById('name-submit-btn').addEventListener('click', submitName);
    document.getElementById('name-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') submitName(); });
    document.getElementById('top-nav-btn').addEventListener('click', topNavigate);
    document.getElementById('top-nav-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') topNavigate(); });

    navBtn.addEventListener('click', navigateByInput);
    navInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') navigateByInput(); });
    submitBtn.addEventListener('click', checkAnswer);
    answerInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') checkAnswer(); });
    nextBtn.addEventListener('click', () => showOnly('final'));
    gotoFinalBtn.addEventListener('click', showFinalQuestion);
    finalQSubmit.addEventListener('click', submitFinalAnswer);
    finalQInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') submitFinalAnswer(); });
    document.getElementById('final-back-btn').addEventListener('click', () => showOnly('quiz'));


    updateFooterBtn();
    showOnly('name');
    document.getElementById('name-input').focus();
</script>
</body>
</html>
